# mosquitto bridge — EXAMPLE / template (repo default, NOT installed).
#
# `make install` only installs a machine-specific mosquitto.<hostname>.cfg; this
# generic file is never copied anywhere (there is deliberately no default-fallback
# for the bridge, unlike hostmon.cfg). Copy it to mosquitto.<hostname>.cfg on the
# box that should do the bridging, edit the remote address/topics, then `make install`.
#
# Purpose: instead of pointing hostmon on each remote box at a central broker, let
# the remote brokers keep their own data and have the local broker pull it in over a
# bridge. A single `hostinfo` (or any subscriber) then sees the whole fleet locally.

# --- bridge to a remote broker ---------------------------------------------
connection example
address remote-host.local:1883

# topic <pattern> <direction> <qos> [local-prefix] [remote-prefix]
#   direction "in" = subscribe on the remote broker and copy messages into us.
# Pull the remote's system/# tree (retained flags are preserved).
topic system/# in 0

# Identify ourselves distinctly on both ends and don't echo bridged messages back.
local_clientid  local-bridge-example
remote_clientid example-bridge-local
try_private true

# QoS 0 + fresh session each connect: no server-side queue to accumulate while down.
cleansession true
notifications false

# Reconnect backoff (min max) and keepalive.
restart_timeout 5 30
keepalive_interval 30

# If the remote broker requires auth, uncomment and set:
# remote_username hostmon
# remote_password CHANGEME

