# -------------------------------------------------------------------------
# hostmon — host system monitor configuration
# -------------------------------------------------------------------------

# mqtt broker
mqtt-client=hostmon
mqtt-server=mqtt://localhost:1883
mqtt-topic-prefix=hostmon
mqtt-tls-insecure=false
mqtt-reconnect-delay=5
mqtt-reconnect-delay-max=60

# publication intervals (seconds)
interval-platform=86400
interval-system=60

# process watchdog (comma-separated list of process names)
# triggers immediate publish on process start/stop
watch-processes=mosquitto

# dns health check (hostname to resolve each cycle)
# omit or leave empty to disable
dns-check-host=branna.gream-home.net

# debug
debug=false
