# -------------------------------------------------------------------------
# hostmon — host system monitor configuration
# -------------------------------------------------------------------------

# mqtt broker
mqtt-client=hostmon
mqtt-server=mqtt://localhost:1883
mqtt-topic-prefix=hostmon
mqtt-tls-insecure=false
mqtt-reconnect-delay=5
mqtt-reconnect-delay-max=60

# publication intervals (seconds)
interval-host=86400
interval-platform=60

# debug
debug=false
